<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert Matrix — Node Operations Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface-2: #1c2128;
      --surface-3: #21262d;
      --border:    #30363d;
      --border-2:  #3d444d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --text-dim:  #484f58;
      --green:        #3fb950;
      --green-bg:     rgba(63,185,80,0.08);
      --green-border: rgba(63,185,80,0.25);
      --red:        #f85149;
      --red-bg:     rgba(248,81,73,0.08);
      --red-border: rgba(248,81,73,0.25);
      --amber:        #e3a24a;
      --amber-bg:     rgba(227,162,74,0.08);
      --amber-border: rgba(227,162,74,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 12px;
      min-height: 100vh;
      line-height: 1.4;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 20;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 700;
    }
    .logo-mark {
      width: 30px; height: 30px;
      background: var(--surface-3); border: 1px solid var(--amber-border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      color: var(--amber); font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .logo-sub { color: var(--text-muted); font-size: 11px; font-weight: 400; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .btn {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: 5px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-family: 'IBM Plex Sans', inherit;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s; text-decoration: none;
    }
    .btn:hover { background: var(--surface-3); }
    .btn-amber { border-color: var(--amber-border); color: var(--amber); }

    /* Summary bar */
    .summary-bar {
      padding: 5px 20px; display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .stat-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 5px; padding: 3px 10px; font-size: 11px;
    }
    .stat-pill .num { font-weight: 700; font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
    .stat-pill .lbl { color: var(--text-muted); }
    .bar-div { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.4} }

    /* Violations */
    .main { padding: 12px 20px 28px; }
    .viol-panel { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
    .viol-hdr {
      background: var(--surface-2); padding: 5px 12px;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .viol-body { padding: 4px 12px 6px; background: var(--surface); }
    .viol-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px;
    }
    .viol-row:last-child { border-bottom: none; }
    .viol-tag {
      font-size: 8px; font-weight: 700; text-transform: uppercase; padding: 1px 5px;
      border-radius: 2px; flex-shrink: 0;
      background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border);
    }
    .viol-msg { flex: 1; color: var(--text-muted); }
    .viol-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
    .viol-thresh { font-size: 9px; color: var(--text-dim); }
    .no-viols { padding: 8px 0; color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 6px; }

    /* Section */
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-muted); margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Matrix */
    .matrix-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    .matrix { border-collapse: collapse; background: var(--surface); }
    .matrix th, .matrix td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .matrix th:last-child, .matrix td:last-child { border-right: none; }
    .matrix tr:last-child td { border-bottom: none; }

    /* Row label cell */
    .rlbl {
      padding: 6px 12px; background: var(--surface-2);
      min-width: 165px; vertical-align: middle; position: sticky; left: 0; z-index: 2;
    }
    .rlbl-name { font-size: 11px; font-weight: 600; }
    .rlbl-desc { font-size: 9px; color: var(--text-dim); margin-top: 1px; }

    /* Column header */
    .chdr { padding: 5px 8px; text-align: center; background: var(--surface-2); }
    .chdr-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 2px;
    }
    .chdr-name { font-size: 11px; font-weight: 700; }
    .chdr-sub  { font-size: 8px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

    /* Node group header */
    .grphdr {
      background: var(--surface-3); padding: 3px 8px; text-align: center;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border-2);
    }

    /* Alert cell */
    .acell {
      padding: 6px 8px; min-width: 100px; max-width: 130px;
      vertical-align: top;
    }
    .acell.na { text-align: center; vertical-align: middle; color: var(--text-dim); font-size: 10px; background: rgba(255,255,255,0.01); }
    .acell.off { opacity: 0.35; }
    .acell.ok  { }
    .acell.alert { background: var(--red-bg); outline: 1px solid var(--red-border); outline-offset: -1px; }
    .acell.bcast { background: rgba(227,162,74,0.03); }
    .acell.bcast.alert { background: var(--red-bg); }

    /* Toggle */
    .row1 { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .toggle { position: relative; width: 28px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--surface-3); border: 1px solid var(--border-2);
      border-radius: 8px; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--green); border-color: var(--green); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 9px; height: 9px;
      border-radius: 50%; background: var(--text-dim);
      transition: transform 0.2s, background 0.2s; pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(13px); background: #fff; }

    .astatus { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2px; }
    .astatus.ok    { color: var(--green); }
    .astatus.alert { color: var(--red); }
    .astatus.off   { color: var(--text-dim); }

    /* Threshold row */
    .thresh-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
    .thresh-dir {
      font-size: 9px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0; width: 10px; text-align: center;
    }
    .thresh-input {
      background: var(--surface-3); border: 1px solid var(--border);
      color: var(--text); font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; padding: 2px 5px; border-radius: 3px;
      width: 56px; text-align: right;
    }
    .thresh-input:focus { outline: none; border-color: var(--amber-border); }
    .thresh-unit { font-size: 9px; color: var(--text-dim); }

    .curr { font-size: 9px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
    .curr .ok    { color: var(--green); }
    .curr .alert { color: var(--red); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">⬡</div>
    Node Operations Center
    <span class="logo-sub">— Alert Matrix</span>
  </div>
  <div class="header-right">
    <span style="font-size:10px;color:var(--text-dim)" id="simLabel">Simulated state</span>
    <button class="btn" onclick="simulate()">↻ Resimulate</button>
    <button class="btn" onclick="saveConfig(this)">✓ Save</button>
    <a class="btn btn-amber" href="index.html">← Dashboard</a>
  </div>
</header>

<div class="summary-bar" id="summaryBar"></div>

<div class="main">
  <div class="viol-panel">
    <div class="viol-hdr">
      <span>Active Alerts</span>
      <span id="violCount" style="font-family:'IBM Plex Mono',monospace;color:var(--text-muted)"></span>
    </div>
    <div class="viol-body" id="violsBody"></div>
  </div>

  <div class="section">
    <div class="section-title">Network Health — per chain</div>
    <div class="matrix-wrap"><table class="matrix" id="netMatrix"></table></div>
  </div>

  <div class="section">
    <div class="section-title">Node Health — per node</div>
    <div class="matrix-wrap"><table class="matrix" id="nodeMatrix"></table></div>
  </div>
</div>

<script>
// ─── Chain Config ─────────────────────────────────────────────────────────────
const CHAINS = [
  {
    id: 'eth', name: 'Ethereum', icon: 'Ξ',
    iconBg: 'rgba(98,126,234,0.15)', iconColor: '#627eea', typeLabel: 'L1 · PoS',
    tpsRange: [12,28], feeRange: [0.4,3.2],
    broadcastNode: { id:'FNDB-ETH-VAL-01', type:'Validator' },
    readNodes: [
      {id:'FNDB-ETH-RO-01',type:'Read-Only'},
      {id:'FNDB-ETH-RO-02',type:'Read-Only'},
      {id:'FNDB-ETH-RO-03',type:'Read-Only'},
    ],
  },
  {
    id: 'sol', name: 'Solana', icon: '◎',
    iconBg: 'rgba(153,69,255,0.15)', iconColor: '#9945ff', typeLabel: 'L1 · PoH',
    tpsRange: [2200,4800], feeRange: [0.000025,0.000025],
    broadcastNode: { id:'FNDB-SOL-VAL-01', type:'Validator' },
    readNodes: [
      {id:'FNDB-SOL-RO-01',type:'Read-Only'},
      {id:'FNDB-SOL-RO-02',type:'Read-Only'},
      {id:'FNDB-SOL-RO-03',type:'Read-Only'},
    ],
  },
  {
    id: 'canton', name: 'Canton', icon: 'C',
    iconBg: 'rgba(74,127,212,0.15)', iconColor: '#4a7fd4', typeLabel: 'Enterprise DLT',
    isEnterprise: true,
    broadcastNode: { id:'FNDB-CANTON-PART-01', type:'Participant' },
    readNodes: [
      {id:'FNDB-CANTON-RO-01',type:'Observer'},
      {id:'FNDB-CANTON-RO-02',type:'Observer'},
    ],
  },
  {
    id: 'base', name: 'Base', icon: 'B',
    iconBg: 'rgba(0,102,255,0.15)', iconColor: '#4d88ff', typeLabel: 'OP Stack L2',
    isL2: true, tpsRange: [15,85], feeRange: [0.0002,0.002],
    broadcastNode: { id:'FNDB-BASE-NODE-01', type:'Writer' },
    readNodes: [
      {id:'FNDB-BASE-RO-01',type:'Read-Only'},
      {id:'FNDB-BASE-RO-02',type:'Read-Only'},
      {id:'FNDB-BASE-RO-03',type:'Read-Only'},
    ],
  },
];

// ─── Alert Definitions ────────────────────────────────────────────────────────
// type: 'bool' = on/off only | 'above' = alert when value exceeds threshold | 'below' = alert when value falls below threshold
const NET_ALERTS = [
  { id:'netStatus',     name:'Network Status',         desc:'Alert when degraded or halted',            type:'bool',  applies:['eth','sol','canton','base'], defaults:{enabled:true} },
  { id:'broadcastDown', name:'Broadcast Node Offline',  desc:'Broadcast/validator is offline',           type:'bool',  applies:['eth','sol','canton','base'], defaults:{enabled:true} },
  { id:'broadcastDeg',  name:'Broadcast Node Degraded', desc:'Broadcast/validator is degraded',          type:'bool',  applies:['eth','sol','canton','base'], defaults:{enabled:true} },
  { id:'tps',           name:'TPS Drop',                desc:'Throughput falls below min',               type:'below', unit:'TPS',       applies:['eth','sol','base'],
    chainThresh:{ eth:10, sol:1000, base:10 }, defaults:{enabled:true} },
  { id:'feeUSD',        name:'Fee Spike',               desc:'Transaction fee exceeds max (USD)',         type:'above', unit:'USD',       applies:['eth','sol','base'],
    chainThresh:{ eth:2.5, sol:0.005, base:0.005 }, defaults:{enabled:false} },
  { id:'ledgerEvents',  name:'Ledger Events Drop',      desc:'Canton DAML events/sec below min',         type:'below', unit:'ev/s',      applies:['canton'], chainThresh:{canton:50}, defaults:{enabled:true} },
  { id:'contracts',     name:'Active Contracts Drop',   desc:'Canton active contracts below min',         type:'below', unit:'contracts', applies:['canton'], chainThresh:{canton:5000}, defaults:{enabled:false} },
  { id:'syncDomain',    name:'Sync Domain Degraded',    desc:'Canton sync domain offline or degraded',   type:'bool',  applies:['canton'], defaults:{enabled:true} },
  { id:'l1Lag',         name:'L1 Data Lag',             desc:'Base L1 lag exceeds max (blocks behind)',  type:'above', unit:'blocks',    applies:['base'], chainThresh:{base:4}, defaults:{enabled:true} },
  { id:'bridge',        name:'Bridge Degraded',         desc:'Base L1↔L2 bridge degraded',              type:'bool',  applies:['base'], defaults:{enabled:true} },
  { id:'sequencer',     name:'Sequencer Degraded',      desc:'Base Coinbase sequencer degraded',         type:'bool',  applies:['base'], defaults:{enabled:true} },
];

const NODE_ALERTS = [
  { id:'down',    name:'Node Offline',      desc:'Node transitions to offline',               type:'bool',  defaults:{enabled:true} },
  { id:'deg',     name:'Node Degraded',     desc:'Node transitions to degraded',              type:'bool',  defaults:{enabled:true} },
  { id:'lag',     name:'Block / Event Lag', desc:'Lag exceeds max blocks / events',           type:'above', unit:'blk', defaults:{enabled:true,  thresh:10} },
  { id:'uptime',  name:'30d Uptime',        desc:'Uptime % falls below min',                  type:'below', unit:'%',   defaults:{enabled:true,  thresh:97.0} },
  { id:'stale',   name:'Stale Update',      desc:'No heartbeat within max minutes',           type:'above', unit:'min', defaults:{enabled:true,  thresh:10} },
];

// ─── Config ───────────────────────────────────────────────────────────────────
function buildDefaultCfg() {
  const cfg = { network:{}, nodes:{} };
  for (const c of CHAINS) {
    cfg.network[c.id] = {};
    for (const a of NET_ALERTS) {
      if (!a.applies.includes(c.id)) continue;
      const thresh = a.chainThresh ? a.chainThresh[c.id] : undefined;
      cfg.network[c.id][a.id] = { ...a.defaults, ...(thresh != null ? {thresh} : {}) };
    }
  }
  for (const c of CHAINS) {
    for (const n of [c.broadcastNode, ...c.readNodes]) {
      cfg.nodes[n.id] = {};
      for (const a of NODE_ALERTS) cfg.nodes[n.id][a.id] = { ...a.defaults };
    }
  }
  return cfg;
}

let cfg = (() => {
  try { const s = localStorage.getItem('fndb_am_v3'); if (s) return JSON.parse(s); } catch(e) {}
  return buildDefaultCfg();
})();

function saveConfig(btn) {
  localStorage.setItem('fndb_am_v3', JSON.stringify(cfg));
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = '✓ Save', 1800); }
}

// ─── Simulation ───────────────────────────────────────────────────────────────
const sim = {};
const rand  = (a,b) => Math.random()*(b-a)+a;
const randI = (a,b) => Math.floor(rand(a,b+1));

function simulate() {
  for (const c of CHAINS) {
    const bDown = Math.random() < 0.10;
    const bDeg  = !bDown && Math.random() < 0.12;
    sim[c.id] = {
      netBad:        bDown || bDeg,
      broadcastDown: bDown,
      broadcastDeg:  bDeg,
      tps:           c.tpsRange ? randI(c.tpsRange[0], c.tpsRange[1]) : null,
      feeUSD:        c.feeRange ? parseFloat(rand(c.feeRange[0], c.feeRange[1]).toFixed(6)) : null,
      ledgerEvents:  c.isEnterprise ? randI(20,400)   : null,
      contracts:     c.isEnterprise ? randI(3000,13000): null,
      syncDomainDeg: c.isEnterprise ? Math.random()<0.12 : false,
      l1Lag:         c.isL2 ? randI(0,8)   : null,
      bridgeDeg:     c.isL2 ? Math.random()<0.08 : false,
      sequencerDeg:  c.isL2 ? Math.random()<0.10 : false,
    };
    for (const n of [c.broadcastNode, ...c.readNodes]) {
      const st = Math.random()>0.82 ? (Math.random()>0.5?'degraded':'offline') : 'online';
      sim[n.id] = {
        status: st,
        lag:    st==='online' ? randI(0,3)  : st==='degraded' ? randI(3,18)  : randI(15,60),
        uptime: parseFloat(st==='online' ? (99+rand(0,0.99)).toFixed(2) : st==='degraded' ? (95+rand(0,3.5)).toFixed(2) : (88+rand(0,6)).toFixed(2)),
        stale:  st==='online' ? randI(0,4)  : st==='degraded' ? randI(2,12) : randI(8,30),
      };
    }
  }
  document.getElementById('simLabel').textContent = `Simulated at ${new Date().toLocaleTimeString()}`;
  render();
}

// ─── Evaluate ─────────────────────────────────────────────────────────────────
function evalNet(chainId, alertId) {
  const s = sim[chainId]; const c = cfg.network[chainId]?.[alertId];
  if (!c?.enabled || !s) return null;
  if (alertId==='netStatus')     return s.netBad        ? 'alert' : 'ok';
  if (alertId==='broadcastDown') return s.broadcastDown ? 'alert' : 'ok';
  if (alertId==='broadcastDeg')  return s.broadcastDeg  ? 'alert' : 'ok';
  if (alertId==='syncDomain')    return s.syncDomainDeg ? 'alert' : 'ok';
  if (alertId==='bridge')        return s.bridgeDeg     ? 'alert' : 'ok';
  if (alertId==='sequencer')     return s.sequencerDeg  ? 'alert' : 'ok';
  const val = { tps:s.tps, feeUSD:s.feeUSD, ledgerEvents:s.ledgerEvents, contracts:s.contracts, l1Lag:s.l1Lag }[alertId];
  if (val==null) return null;
  const a = NET_ALERTS.find(r=>r.id===alertId);
  return a.type==='below' ? (val<=c.thresh?'alert':'ok') : (val>=c.thresh?'alert':'ok');
}

function evalNode(nodeId, alertId) {
  const s = sim[nodeId]; const c = cfg.nodes[nodeId]?.[alertId];
  if (!c?.enabled || !s) return null;
  if (alertId==='down') return s.status==='offline'  ? 'alert' : 'ok';
  if (alertId==='deg')  return s.status==='degraded' ? 'alert' : 'ok';
  const val = {lag:s.lag, uptime:s.uptime, stale:s.stale}[alertId];
  if (val==null) return null;
  const a = NODE_ALERTS.find(r=>r.id===alertId);
  return a.type==='below' ? (val<=c.thresh?'alert':'ok') : (val>=c.thresh?'alert':'ok');
}

function netCurrVal(chainId, alertId) {
  const s = sim[chainId]; if (!s) return null;
  const m = { netStatus: s.netBad?'Degraded/Halted':'Healthy', broadcastDown: s.broadcastDown?'Offline':'Online',
    broadcastDeg: s.broadcastDeg?'Degraded':'Online', tps:`${s.tps} TPS`, feeUSD:`$${s.feeUSD}`,
    ledgerEvents:`${s.ledgerEvents} ev/s`, contracts:s.contracts?.toLocaleString(),
    syncDomain:s.syncDomainDeg?'Degraded':'Active', l1Lag:`${s.l1Lag} blk`,
    bridge:s.bridgeDeg?'Degraded':'Operational', sequencer:s.sequencerDeg?'Degraded':'Active' };
  return m[alertId] ?? null;
}

function nodeCurrVal(nodeId, alertId) {
  const s = sim[nodeId]; if (!s) return null;
  return { down:s.status, deg:s.status, lag:`${s.lag} blk`, uptime:`${s.uptime}%`, stale:`${s.stale} min` }[alertId] ?? null;
}

// ─── Cell Builder ─────────────────────────────────────────────────────────────
function mkToggle(id, checked, onchange) {
  return `<label class="toggle"><input type="checkbox" id="${id}" ${checked?'checked':''} onchange="${onchange}">
    <div class="toggle-track"></div><div class="toggle-thumb"></div></label>`;
}

function mkCell(cellCfg, alertDef, viol, currVal, toggleCb, threshCb, isBcast) {
  const on     = !!cellCfg?.enabled;
  const state  = !on ? 'off' : viol === 'alert' ? 'alert' : 'ok';
  const stLbl  = !on ? 'Off' : viol === 'alert' ? 'Alert' : 'OK';
  const cvCls  = !on ? '' : viol === 'alert' ? 'alert' : 'ok';
  const cellCls= `acell ${state==='alert'?'alert':''} ${!on?'off':''} ${isBcast?'bcast':''}`.trim();
  const tid    = `t_${Math.random().toString(36).slice(2)}`;

  let threshHtml = '';
  if (alertDef.type !== 'bool') {
    const dir = alertDef.type === 'above' ? '↑' : '↓';
    const unit = alertDef.unit || '';
    threshHtml = `<div class="thresh-row">
      <span class="thresh-dir">${dir}</span>
      <input class="thresh-input" type="number" step="any" value="${cellCfg?.thresh ?? ''}"
        onchange="${threshCb}">
      <span class="thresh-unit">${unit}</span>
    </div>`;
  }

  return `<td class="${cellCls}">
    <div class="row1">
      ${mkToggle(tid, on, toggleCb)}
      <span class="astatus ${state}">${stLbl}</span>
    </div>
    ${threshHtml}
    ${currVal != null ? `<div class="curr">Now: <span class="${cvCls}">${currVal}</span></div>` : ''}
  </td>`;
}

// ─── Render: Network Matrix ───────────────────────────────────────────────────
function renderNetMatrix() {
  let h = '<thead><tr>';
  h += '<th class="rlbl chdr" style="text-align:left"><span style="font-size:9px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Alert Rule</span></th>';
  for (const c of CHAINS) {
    h += `<th class="chdr" style="min-width:110px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="chdr-icon" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
        <div class="chdr-name">${c.name}</div>
        <div class="chdr-sub">${c.typeLabel}</div>
      </div></th>`;
  }
  h += '</tr></thead><tbody>';

  for (const a of NET_ALERTS) {
    h += '<tr>';
    h += `<td class="rlbl"><div class="rlbl-name">${a.name}</div><div class="rlbl-desc">${a.desc}</div></td>`;
    for (const c of CHAINS) {
      if (!a.applies.includes(c.id)) { h += '<td class="acell na">—</td>'; continue; }
      const cellCfg = cfg.network[c.id]?.[a.id] || {};
      const viol    = evalNet(c.id, a.id);
      const cv      = netCurrVal(c.id, a.id);
      h += mkCell(cellCfg, a, viol, cv,
        `toggleNet('${c.id}','${a.id}',this.checked)`,
        `updateNetThresh('${c.id}','${a.id}',this.value)`,
        false);
    }
    h += '</tr>';
  }
  h += '</tbody>';
  document.getElementById('netMatrix').innerHTML = h;
}

// ─── Render: Node Matrix ──────────────────────────────────────────────────────
function renderNodeMatrix() {
  const cols = [];
  for (const c of CHAINS) {
    cols.push({ chain:c, node:c.broadcastNode, isBcast:true });
    for (const n of c.readNodes) cols.push({ chain:c, node:n, isBcast:false });
  }

  let h = '<thead><tr>';
  h += '<th class="rlbl chdr" rowspan="2" style="text-align:left;vertical-align:middle"><span style="font-size:9px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Alert Rule</span></th>';
  for (const c of CHAINS) {
    h += `<th colspan="${1+c.readNodes.length}" class="grphdr">
      <span style="display:inline-flex;align-items:center;gap:5px">
        <span style="width:13px;height:13px;border-radius:50%;background:${c.iconBg};color:${c.iconColor};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:monospace">${c.icon}</span>
        ${c.name}</span></th>`;
  }
  h += '</tr><tr>';
  for (const { node, isBcast } of cols) {
    const short = node.id.replace('FNDB-','');
    h += `<th class="chdr ${isBcast?'bcast':''}" style="min-width:100px;${isBcast?'background:rgba(227,162,74,0.06)':''}">
      <div style="font-size:9px;font-weight:600;color:${isBcast?'var(--amber)':'var(--text)'};font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px" title="${node.id}">${short}</div>
      <div style="font-size:8px;color:var(--text-dim);margin-top:1px">${node.type}</div>
      ${isBcast?'<div style="font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--amber);margin-top:1px">Broadcast</div>':''}
    </th>`;
  }
  h += '</tr></thead><tbody>';

  for (const a of NODE_ALERTS) {
    h += '<tr>';
    h += `<td class="rlbl"><div class="rlbl-name">${a.name}</div><div class="rlbl-desc">${a.desc}</div></td>`;
    for (const { chain, node, isBcast } of cols) {
      const cellCfg = cfg.nodes[node.id]?.[a.id] || {};
      const viol    = evalNode(node.id, a.id);
      const cv      = nodeCurrVal(node.id, a.id);
      const unit    = a.id==='lag' && chain.isEnterprise ? 'events' : a.unit;
      const aWithUnit = { ...a, unit };
      h += mkCell(cellCfg, aWithUnit, viol, cv,
        `toggleNode('${node.id}','${a.id}',this.checked)`,
        `updateNodeThresh('${node.id}','${a.id}',this.value)`,
        isBcast);
    }
    h += '</tr>';
  }
  h += '</tbody>';
  document.getElementById('nodeMatrix').innerHTML = h;
}

// ─── Violations + Summary ─────────────────────────────────────────────────────
function renderViolations() {
  const viols = [];
  for (const c of CHAINS) {
    for (const a of NET_ALERTS) {
      if (!a.applies.includes(c.id)) continue;
      if (evalNet(c.id, a.id) === 'alert') {
        const cc = cfg.network[c.id]?.[a.id];
        viols.push({ msg:`${c.name} — ${a.name}`, val:netCurrVal(c.id,a.id),
          thresh: a.type!=='bool' ? `${a.type==='above'?'max':'min'} ${cc.thresh} ${a.unit}` : null });
      }
    }
  }
  for (const c of CHAINS) {
    for (const n of [c.broadcastNode,...c.readNodes]) {
      for (const a of NODE_ALERTS) {
        if (evalNode(n.id, a.id) === 'alert') {
          const nc = cfg.nodes[n.id]?.[a.id];
          viols.push({ msg:`${n.id} — ${a.name}`, val:nodeCurrVal(n.id,a.id),
            thresh: a.type!=='bool' ? `${a.type==='above'?'max':'min'} ${nc.thresh} ${a.unit}` : null });
        }
      }
    }
  }

  let enabled = 0;
  for (const c of CHAINS) {
    for (const a of NET_ALERTS) { if (a.applies.includes(c.id) && cfg.network[c.id]?.[a.id]?.enabled) enabled++; }
    for (const n of [c.broadcastNode,...c.readNodes]) {
      for (const a of NODE_ALERTS) { if (cfg.nodes[n.id]?.[a.id]?.enabled) enabled++; }
    }
  }

  document.getElementById('summaryBar').innerHTML = `
    <div class="stat-pill">
      <div class="dot dot-red"></div>
      <span class="num" style="color:var(--red)">${viols.length}</span>
      <span class="lbl">Active Alerts</span>
    </div>
    <div class="bar-div"></div>
    <div class="stat-pill">
      <div class="dot dot-green"></div>
      <span class="num">${enabled}</span>
      <span class="lbl">Rules Enabled</span>
    </div>
    <div class="stat-pill" style="margin-left:auto">
      <span style="color:var(--text-dim);font-size:11px">4 chains · 14 nodes</span>
    </div>`;

  document.getElementById('violCount').textContent = viols.length ? `${viols.length} active` : 'none';
  const body = document.getElementById('violsBody');
  if (!viols.length) {
    body.innerHTML = `<div class="no-viols"><span style="color:var(--green)">✓</span> No active alerts — all metrics within configured thresholds</div>`;
  } else {
    body.innerHTML = viols.map(v => `
      <div class="viol-row">
        <span class="viol-tag">Alert</span>
        <span class="viol-msg">${v.msg}</span>
        <span class="viol-val">${v.val||''}</span>
        ${v.thresh ? `<span class="viol-thresh">${v.thresh}</span>` : ''}
      </div>`).join('');
  }
}

// ─── Handlers ────────────────────────────────────────────────────────────────
function toggleNet(chainId, alertId, checked) {
  (cfg.network[chainId] = cfg.network[chainId]||{})[alertId] = cfg.network[chainId][alertId]||{};
  cfg.network[chainId][alertId].enabled = checked;
  render();
}
function toggleNode(nodeId, alertId, checked) {
  (cfg.nodes[nodeId] = cfg.nodes[nodeId]||{})[alertId] = cfg.nodes[nodeId][alertId]||{};
  cfg.nodes[nodeId][alertId].enabled = checked;
  render();
}
function updateNetThresh(chainId, alertId, val) {
  (cfg.network[chainId] = cfg.network[chainId]||{})[alertId] = cfg.network[chainId][alertId]||{};
  cfg.network[chainId][alertId].thresh = parseFloat(val);
  renderViolations();
}
function updateNodeThresh(nodeId, alertId, val) {
  (cfg.nodes[nodeId] = cfg.nodes[nodeId]||{})[alertId] = cfg.nodes[nodeId][alertId]||{};
  cfg.nodes[nodeId][alertId].thresh = parseFloat(val);
  renderViolations();
}

function render() { renderViolations(); renderNetMatrix(); renderNodeMatrix(); }

simulate();
</script>
</body>
</html>
